<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
</head>
<body>
    <h1>Library</h1>
    
    <button id="openDialog"> New Book </button>
    
    <div id ="bookGrid"></div>
    
    <dialog id="bookDialog">
        <h2>Add a book</h2>
        <label>Title</label>
        <input type="text" id="title">

        <label>Author</label>
        <input type="text" id="author">

        <label>Pages</label>
        <input type="number" id="pages">

        <label>Read?</label>
        <input type="checkbox" id="read">

        <button id="cancelDialog">Cancel</button>
        <button id="submitBook">Add</button>
    </dialog>

    <script src="app.js"></script>
     
</body>
</html>
